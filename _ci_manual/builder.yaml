name: Build & publish addon image

# Baut das HA-Addon-Image auf GitHubs Runnern (mit funktionierendem DNS) und
# pusht es nach GHCR. Der HA-Host muss dann NICHT mehr selbst bauen, sondern
# zieht das fertige Image — umgeht damit kaputtes Build-DNS auf dem Host.

on:
  push:
    branches: [main]
    paths:
      - 'wallbox-dolibarr/**'
      - '.github/workflows/builder.yaml'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, amd64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.arch }}
        uses: home-assistant/builder@2025.03.0
        with:
          args: |
            --${{ matrix.arch }} \
            --target wallbox-dolibarr \
            --image "{arch}-addon-wallbox-dolibarr" \
            --docker-hub "ghcr.io/iron-exx" \
            --addon
