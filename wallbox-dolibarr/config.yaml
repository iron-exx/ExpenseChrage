name: "Wallbox Dolibarr Invoice"
description: "RFID-basierte Abrechnung von Wallbox-Ladevorgängen via Dolibarr"
version: "1.0.0"
slug: "wallbox-dolibarr"
url: "https://github.com/iron-exx/evcharge-dolibarr-invoice"
init: false
homeassistant_api: true

arch:
  - aarch64
  - amd64

options:
  log_level: "INFO"
  wallbox_id: "meine_wallbox"
  rfid_whitelist:
    - "EFCD083E"
  dolibarr_url: "https://dolibarr.example.com"
  api_token: ""
  transmit_interval: 300

schema:
  log_level: "list(DEBUG|INFO|WARNING|ERROR)"
  wallbox_id: str
  rfid_whitelist:
    - str
  dolibarr_url: str
  api_token: str
  transmit_interval: int
