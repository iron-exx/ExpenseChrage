name: "Wallbox Dolibarr Invoice"
description: "RFID-basierte Abrechnung von Wallbox-Ladevorgängen via Dolibarr"
version: "1.0.8"
slug: "wallbox-dolibarr"
url: "https://github.com/iron-exx/evcharge-dolibarr-invoice"
init: false
homeassistant_api: true
ingress: true
ingress_port: 8099

arch:
  - aarch64
  - amd64

options:
  log_level: "INFO"
  wallbox_id: "meine_wallbox"
  rfid_whitelist:
    - "EFCD083E"
  ha_token: ""
  dolibarr_url: "https://dolibarr.example.com"
  api_token: ""
  transmit_interval: 300
  sensor_rfid: "sensor.alfen_eve_tag_socket_1"
  sensor_energy: "sensor.alfen_energy_total"
  sensor_state: "sensor.alfen_eve_display_state_socket_1"

schema:
  log_level: "list(DEBUG|INFO|WARNING|ERROR)"
  wallbox_id: str
  rfid_whitelist:
    - str
  ha_token: str
  dolibarr_url: str
  api_token: str
  transmit_interval: int
  sensor_rfid: str
  sensor_energy: str
  sensor_state: str
