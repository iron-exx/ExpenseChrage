name: "Wallbox-Dolibarr Addon"
description: "RFID-basierte Abrechnung von Wallbox-Ladevorgängen"
version: "1.0.0"
slug: "wallbox-dolibarr"
init: false

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

ports:
  8099/tcp: null

options:
  log_level: "INFO"

  # Multi-Wallbox Konfiguration (EXT-01)
  wallboxes:
    - id: "alfen_eve"
      name: "Alfen Eve (Hauptwandbox)"
      enabled: true
      default: true

  # Fallback für Abwärtskompatibilität (wenn wallbox_id verwendet wird)
  wallbox_id: "alfen_eve"

  # RFID Whitelist mit optionaler wallbox-Beschränkung
  rfid_whitelist:
    - "EFCD083E"

  # API-Konfiguration für Dolibarr-Übertragung (Phase 3)
  api:
    dolibarr_url: "https://dolibarr.example.com"
    api_token: "your_dolapikey_here"
    transmit_interval: 300  # Sekunden (5 Minuten)
    timeout: 30  # Sekunden für API-Calls

schema:
  log_level: "list(DEBUG|INFO|WARNING|ERROR)"
  wallboxes: "list"
  wallbox_id: "str"
  rfid_whitelist: "list(str)"
  api:
    dolibarr_url: "str"
    api_token: "str"
    transmit_interval: "int"
    timeout: "int"

logging:
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
