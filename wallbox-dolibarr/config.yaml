name: "ExpenseCharge"
description: "ExpenseCharge — Ladevorgänge. Spesen. Abgerechnet."
version: "1.6.2"
slug: "wallbox-dolibarr"
init: false

image: "ghcr.io/iron-exx/{arch}-addon-expensecharge"

arch:
  - aarch64
  - amd64

ingress: true
ingress_port: 8099
homeassistant_api: true

ports:
  8099/tcp: null

options:
  log_level: "INFO"

  # Multi-Wallbox Konfiguration
  wallboxes:
    - id: "alfen_eve"
      name: "Alfen Eve (Hauptwandbox)"
      enabled: true
      default: true

  # Fallback für Abwärtskompatibilität
  wallbox_id: "alfen_eve"

  # RFID Whitelist
  rfid_whitelist:
    - "EFCD083E"

  # HA-Sensoren der Wallbox (Alfen Eve Vorgabe — bei anderer Wallbox anpassen)
  sensor_rfid: "sensor.alfen_eve_tag_socket_1"
  sensor_energy: "sensor.alfen_eve_meter_reading_socket_1"
  sensor_state: "sensor.alfen_eve_main_state_socket_1"

  # Nur nötig, falls SUPERVISOR_TOKEN nicht verfügbar ist (Normalfall: leer lassen)
  ha_token: ""

  # Mindest-kWh, ab dem eine Session als echte Ladung gilt (sonst "discarded")
  min_session_kwh: 0.05

  # API-Konfiguration für Dolibarr-Übertragung
  api:
    dolibarr_url: "https://dolibarr.example.com"
    api_token: "your_dolapikey_here"
    transmit_interval: 300
    timeout: 30

schema:
  log_level: "list(DEBUG|INFO|WARNING|ERROR)"
  wallboxes:
    - id: "str"
      name: "str"
      enabled: "bool"
      default: "bool"
  wallbox_id: "str"
  rfid_whitelist:
    - "str"
  sensor_rfid: "str"
  sensor_energy: "str"
  sensor_state: "str"
  ha_token: "password"
  min_session_kwh: "float"
  api:
    dolibarr_url: "str"
    api_token: "str"
    transmit_interval: "int"
    timeout: "int"

logging:
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
