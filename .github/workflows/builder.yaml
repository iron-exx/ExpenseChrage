name: Build & publish addon image

# Baut das Addon-Image auf GitHubs Runnern (funktionierendes DNS) und pusht es
# multi-arch nach GHCR. Der HA-Host muss dann nicht mehr selbst bauen, sondern
# zieht nur noch das fertige Image (von ghcr.io, das auf dem Host funktioniert).
#
# DIESE DATEI MUSS im Repo unter .github/workflows/builder.yaml liegen.

on:
  push:
    branches: [main]
    paths:
      - 'wallbox-dolibarr/**'
      - '.github/workflows/builder.yaml'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base:3.23
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base:3.23
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Addon-Version aus config.yaml lesen
        id: ver
        run: |
          V=$(grep -E '^version:' wallbox-dolibarr/config.yaml | head -1 | sed -E 's/.*"(.*)".*/\1/')
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Addon-Version: $V"

      - name: Build & push ${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          context: wallbox-dolibarr
          file: wallbox-dolibarr/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.base }}
            BUILD_VERSION=${{ steps.ver.outputs.version }}
            BUILD_ARCH=${{ matrix.arch }}
          tags: |
            ghcr.io/iron-exx/${{ matrix.arch }}-addon-wallbox-dolibarr:${{ steps.ver.outputs.version }}
            ghcr.io/iron-exx/${{ matrix.arch }}-addon-wallbox-dolibarr:latest
